updates:
- directory: /
  ignore:
  - dependency-name: "Aspire.Hosting"
  - dependency-name: "Aspire.Hosting.*"
  labels:
  - dependencies
  - skip-nuget-publish
  package-ecosystem: nuget
  schedule:
    interval: weekly
- directory: /
  ignore:
  - dependency-name: "github/gh-aw-actions/**" # Managed by gh aw compile. Version-locked to the gh-aw compiler; do not bump.
  labels:
  - dependencies
  - skip-nuget-publish
  package-ecosystem: github-actions
  schedule:
    interval: weekly
version: 2
