name: Run Integration Tests

on:
  workflow_call:
    inputs:
      selected-tests:
        description: JSON array of test project names to run. Empty runs the full matrix.
        required: false
        type: string
        default: ""

jobs:
  resolve-test-matrix:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has-tests: ${{ steps.resolve.outputs.has_tests }}
      tests: ${{ steps.resolve.outputs.tests }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Resolve test matrix
        id: resolve
        env:
          SELECTED_TESTS: ${{ inputs.selected-tests }}
        shell: bash
        run: |
          if [ -n "${SELECTED_TESTS}" ]; then
            TESTS_JSON="${SELECTED_TESTS}"
            python -m json.tool <<< "${TESTS_JSON}" > /dev/null
          else
            TESTS_JSON="$(bash ./eng/testing/generate-test-list-for-workflow.sh --json)"
          fi

          echo "tests=${TESTS_JSON}" >> "${GITHUB_OUTPUT}"

          if [ "${TESTS_JSON}" = "[]" ]; then
            echo "has_tests=false" >> "${GITHUB_OUTPUT}"
          else
            echo "has_tests=true" >> "${GITHUB_OUTPUT}"
          fi

          echo "## Test matrix" >> "${GITHUB_STEP_SUMMARY}"
          echo >> "${GITHUB_STEP_SUMMARY}"
          TEST_COUNT="$(TESTS_JSON="${TESTS_JSON}" python -c 'import json, os; print(len(json.loads(os.environ["TESTS_JSON"])))')"
          echo "- Selected tests: ${TEST_COUNT}" >> "${GITHUB_STEP_SUMMARY}"
          echo >> "${GITHUB_STEP_SUMMARY}"

          if [ "${TESTS_JSON}" = "[]" ]; then
            echo "No tests were selected." >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "### Tests" >> "${GITHUB_STEP_SUMMARY}"
            TESTS_JSON="${TESTS_JSON}" python -c 'import json, os; [print(f"- `{test}`") for test in json.loads(os.environ["TESTS_JSON"])]' >> "${GITHUB_STEP_SUMMARY}"
          fi

  noop:
    needs: resolve-test-matrix
    if: needs.resolve-test-matrix.outputs.has-tests != 'true'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: No affected tests
        run: echo "No integration tests were selected for this run."

  test:
    needs: resolve-test-matrix
    if: needs.resolve-test-matrix.outputs.has-tests == 'true'
    permissions:
      contents: read
    env:
      DOTNET_CONFIGURATION: Release
      DAPR_VERSION: "1.15.0"
      TEST_PROJECT_PATH: tests/CommunityToolkit.Aspire.${{ matrix.name }}/CommunityToolkit.Aspire.${{ matrix.name }}.csproj
      CI: true
      NPM_CONFIG_PACKAGE_LOCK: false
    runs-on: "${{ matrix.os }}"
    timeout-minutes: 60
    name: ${{ matrix.name }}-${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        name: ${{ fromJson(needs.resolve-test-matrix.outputs.tests) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Runtimes, Caching, and Tools
        uses: ./.github/actions/setup-runtimes-caching
        with:
          name: ${{ matrix.name }}
          docker-username: ${{ secrets.DOCKER_USERNAME }}
          docker-password: ${{ secrets.DOCKER_PASSWORD }}
          docker-registry: ${{ secrets.CUSTOM_CONTAINER_REGISTRY }}

      - name: Verify Docker is running
        if: runner.os == 'Linux'
        run: docker info

      - name: Build test project
        env:
          CI: false
        run: |
          dotnet build ${{ github.workspace }}/${{ env.TEST_PROJECT_PATH }} /bl --configuration ${{ env.DOTNET_CONFIGURATION }}

      - name: Run tests
        run: >-
          dotnet run
          --project "${{ github.workspace }}/${{ env.TEST_PROJECT_PATH }}"
          --no-build
          --configuration ${{ env.DOTNET_CONFIGURATION }}
          --crashdump
          --hangdump
          --hangdump-timeout 7m
          --results-directory "${{ github.workspace }}/testresults"
          --filter-not-trait "category=failing"
          --report-trx
          --report-trx-filename "${{ matrix.name }}-${{ matrix.os }}.trx"
          --coverage
          --coverage-output-format cobertura
          --coverage-output coverage.cobertura.xml
          --report-github
        env:
          CUSTOM_CONTAINER_REGISTRY: ${{ secrets.CUSTOM_CONTAINER_REGISTRY }}

      - name: Dump docker info
        if: always() && runner.os == 'Linux'
        run: |
          docker container ls --all
          docker container ls --all --format json
          docker volume ls
          docker network ls

      - name: Upload bin log artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: binlog-${{ matrix.name }}-${{ matrix.os }}
          path: "**/*.binlog"
        continue-on-error: true

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: testresults-${{ matrix.name }}-${{ matrix.os }}
          path: testresults/**

      - name: Upload npm logs if failed
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: npm-logs-${{ matrix.name }}-${{ matrix.os }}
          path: ${{ runner.os == 'Windows' && 'C:\\npm\\cache\\_logs\\**' || '~/.npm/cache/_logs/**' }}

      - name: Upload TypeScript app host logs if failed
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ts-app-host-logs-${{ matrix.name }}-${{ matrix.os }}
          path: ${{ runner.os == 'Windows' && 'C:\\Users\\runneradmin\\.aspire\\logs\\**' || '/home/runner/.aspire/logs/**' }}

      - name: Aspire doctor
        if: failure()
        run: aspire doctor
