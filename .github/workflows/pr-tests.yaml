name: Verify Test List

on:
  pull_request:
    paths:
      - "tests/**"
      - ".github/workflows/tests.yaml"
      - ".github/workflows/dotnet-ci.yml"
      - "eng/testing/generate-test-list-for-workflow.sh"
      - "eng/testing/select-affected-tests.py"

jobs:
  verify-test-list:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate test list
        run: |
          bash eng/testing/generate-test-list-for-workflow.sh --plain > generated-test-list.txt
          bash eng/testing/generate-test-list-for-workflow.sh --json | python -m json.tool > /dev/null

      - name: Smoke test affected test resolver
        run: >
          python eng/testing/select-affected-tests.py
          --repo-root "${{ github.workspace }}"
          --base-sha "${{ github.event.pull_request.base.sha }}"
          --head-sha "${{ github.event.pull_request.head.sha }}"
          --output-dir "${{ runner.temp }}/affected-tests"
